services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/repo/data
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      MCP_PORT: "3001"
      HOST: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Must match the Docker network service name
        ARCHIMATE_API_URL: http://api:3000
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy

networks:
  default:
    name: archispark
